<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ice Breaker Game</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="ui-container">
        <div id="view-landing" class="view active">
            <h1>Ice Breaker</h1>
            <button id="btn-create">Create Admin Session</button>
            <div id="join-section" style="display: none;">
                <input type="text" id="input-name" placeholder="Enter your name" maxlength="15">
                <button id="btn-join">Join Game</button>
            </div>
        </div>

        <div id="view-admin" class="view">
            <h2>Admin Dashboard</h2>
            <p>Admin Link: <a href="#" id="admin-link"></a> (Keep this secret!)</p>
            <p>Player Join Link: <a href="#" id="join-link" target="_blank"></a></p>
            <label>Game Time (30 - 300s):</label>
            <input type="number" id="input-time" min="30" max="300" value="60">
            <div id="admin-player-list">Waiting for players...</div>
            <button id="btn-start">Start Game</button>
        </div>

        <div id="view-game" class="view">
            <div id="hud">
                <div id="timer">Time: 60</div>
                <div id="ice-counter">Ice: 1000</div>
            </div>
            <canvas id="game-canvas" width="800" height="600"></canvas>

            <div id="banner-win" style="display: none;">
                <h1 id="win-text"></h1>
            </div>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="game.js"></script>
</body>

</html>
